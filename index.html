<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>증기의 용사 — STEAM QUEST</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Black+Han+Sans&family=Gowun+Batang:wght@400;700&family=Do+Hyeon&family=Cinzel:wght@600;800&display=swap" rel="stylesheet">
<style>
:root{
  --ink:#120d0a;
  --brass:#d4af37;
  --brass-d:#a9842a;
  --copper:#c0703c;
  --bronze:#6b4f2a;
  --amber:#ffb347;
  --amber-glow:#ffd27f;
  --patina:#3f7a6e;
  --patina-d:#244e46;
  --parch:#ecdcb4;
  --red:#c0392b;
  --steel:#8fa3a8;
  --shadow:rgba(0,0,0,.55);
}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{height:100%;overflow:hidden;background:#000;font-family:"Gowun Batang",serif;color:var(--parch)}
#game{
  position:relative;width:100vw;height:100vh;margin:0 auto;overflow:hidden;
  background:radial-gradient(ellipse at 50% 35%,#241a12 0%,#160f0a 55%,#0a0705 100%);
  user-select:none;
}
.screen{position:absolute;inset:0;display:none;flex-direction:column;align-items:center;justify-content:center}
.screen.active{display:flex}

/* ===== shared steampunk frame / brass elements ===== */
.brass-frame{
  border:3px solid var(--brass-d);
  border-radius:10px;
  background:linear-gradient(160deg,rgba(40,30,18,.92),rgba(20,14,9,.96));
  box-shadow:0 0 0 2px var(--ink),0 0 40px rgba(0,0,0,.7),inset 0 0 30px rgba(0,0,0,.55);
  position:relative;
}
.rivets::before,.rivets::after{
  content:"";position:absolute;width:9px;height:9px;border-radius:50%;
  background:radial-gradient(circle at 35% 30%,#ffe7a0,var(--brass-d) 60%,#5b4418);
  box-shadow:0 0 4px rgba(0,0,0,.6);
}
.rivets::before{top:8px;left:8px}.rivets::after{top:8px;right:8px}

.gear{position:absolute;border-radius:50%;pointer-events:none;opacity:.18;
  background:
    repeating-conic-gradient(var(--brass) 0deg 12deg,transparent 12deg 24deg);
  -webkit-mask:radial-gradient(circle,transparent 30%,#000 31%,#000 70%,transparent 72%);
          mask:radial-gradient(circle,transparent 30%,#000 31%,#000 70%,transparent 72%);
}
@keyframes spin{to{transform:rotate(360deg)}}
@keyframes spinrev{to{transform:rotate(-360deg)}}

/* steam wisps */
.steam{position:absolute;bottom:-40px;width:60px;height:60px;border-radius:50%;
  background:radial-gradient(circle,rgba(255,240,210,.18),transparent 70%);
  filter:blur(6px);animation:rise 7s linear infinite;pointer-events:none}
@keyframes rise{
  0%{transform:translateY(0) scale(.6);opacity:0}
  20%{opacity:.5}
  100%{transform:translateY(-90vh) scale(2.2);opacity:0}
}

/* ===== TITLE ===== */
#title{background:
  radial-gradient(ellipse at 50% 120%,rgba(63,122,110,.25),transparent 60%),
  radial-gradient(ellipse at 50% 30%,rgba(255,179,71,.12),transparent 55%),
  linear-gradient(180deg,#0c0906,#1d140c 60%,#080604);
  overflow:hidden;
}
.mountains{position:absolute;bottom:0;left:0;right:0;height:42%;
  background:
   linear-gradient(180deg,transparent,#0a0c0a 90%),
   conic-gradient(from 180deg at 20% 100%,transparent 60deg,#13201b 61deg 120deg,transparent 121deg),
   conic-gradient(from 180deg at 55% 100%,transparent 55deg,#0f1a16 56deg 124deg,transparent 125deg),
   conic-gradient(from 180deg at 82% 100%,transparent 58deg,#16231d 59deg 122deg,transparent 123deg);
  opacity:.9;
}
.title-logo{position:relative;text-align:center;z-index:3;animation:floatLogo 5s ease-in-out infinite}
@keyframes floatLogo{0%,100%{transform:translateY(0)}50%{transform:translateY(-10px)}}
.title-sub{font-family:"Cinzel",serif;letter-spacing:.5em;font-size:clamp(11px,2.2vw,18px);
  color:var(--amber-glow);text-shadow:0 0 12px rgba(255,179,71,.7);margin-bottom:6px;padding-left:.5em}
.title-main{font-family:"Black Han Sans",sans-serif;
  font-size:clamp(48px,12vw,128px);line-height:.95;letter-spacing:.02em;
  color:#f3d27a;
  text-shadow:
    0 2px 0 #8a6a1e,0 4px 0 #6b521a,0 6px 0 #4a3811,
    0 8px 14px rgba(0,0,0,.8),
    0 0 30px rgba(255,179,71,.45);
}
.title-main .accent{color:#ffcf6e;
  text-shadow:0 2px 0 #9c7521,0 4px 0 #6b521a,0 0 40px rgba(255,200,90,.9)}
.title-en{font-family:"Cinzel",serif;font-weight:800;letter-spacing:.35em;
  font-size:clamp(13px,2.6vw,24px);color:#cdbf94;margin-top:10px;opacity:.85}
.press{position:absolute;bottom:11%;z-index:4;font-family:"Do Hyeon",sans-serif;
  font-size:clamp(15px,3vw,24px);color:var(--amber-glow);letter-spacing:.15em;
  text-shadow:0 0 14px rgba(255,179,71,.8);animation:blink 1.4s ease-in-out infinite;cursor:pointer}
@keyframes blink{0%,100%{opacity:.25}50%{opacity:1}}
.foot{position:absolute;bottom:14px;font-size:11px;letter-spacing:.2em;color:#7a6a4a;z-index:4}

/* ===== INTRO ===== */
#intro{background:#000}
.intro-text{font-family:"Gowun Batang",serif;font-size:clamp(20px,4.5vw,38px);
  color:#d8cba2;letter-spacing:.08em;text-align:center;min-height:1.4em;max-width:80%;
  text-shadow:0 0 18px rgba(255,179,71,.25)}
.cursor-blink{animation:blink2 .8s steps(1) infinite}
@keyframes blink2{50%{opacity:0}}

/* ===== generic panel screen ===== */
.panel{width:min(560px,90vw);padding:34px 30px 30px;text-align:center;z-index:3}
.panel h2{font-family:"Black Han Sans",sans-serif;font-size:clamp(22px,5vw,34px);
  color:var(--amber-glow);letter-spacing:.04em;margin-bottom:8px;
  text-shadow:0 2px 0 #6b521a,0 0 20px rgba(255,179,71,.4)}
.panel .lead{font-size:clamp(14px,3vw,18px);color:#cbbd92;margin-bottom:26px;line-height:1.6}

/* name input */
#nameInput{width:100%;background:#0e0a07;border:2px solid var(--brass-d);border-radius:8px;
  padding:14px 16px;font-family:"Do Hyeon",sans-serif;font-size:22px;color:#ffe7a8;
  text-align:center;letter-spacing:.1em;outline:none;box-shadow:inset 0 0 16px rgba(0,0,0,.7)}
#nameInput:focus{border-color:var(--amber);box-shadow:inset 0 0 16px rgba(0,0,0,.7),0 0 16px rgba(255,179,71,.4)}

.btn{display:inline-block;margin-top:24px;cursor:pointer;font-family:"Do Hyeon",sans-serif;
  font-size:clamp(16px,3.5vw,20px);letter-spacing:.08em;color:#1a120a;
  background:linear-gradient(180deg,#ffd874,#d4af37 55%,#a9842a);
  border:2px solid #7a5f1e;border-radius:8px;padding:11px 30px;
  box-shadow:0 4px 0 #5b4418,0 6px 12px rgba(0,0,0,.5);transition:.12s;
  text-shadow:0 1px 0 rgba(255,255,255,.4)}
.btn:hover{transform:translateY(-1px);filter:brightness(1.08)}
.btn:active{transform:translateY(3px);box-shadow:0 1px 0 #5b4418}
.btn.ghost{background:none;color:var(--amber-glow);border-color:var(--brass-d);
  box-shadow:none;text-shadow:none}

/* class cards */
.classes{display:flex;gap:16px;justify-content:center;flex-wrap:wrap;margin-top:6px}
.classcard{width:150px;padding:18px 14px;cursor:pointer;border:2px solid var(--bronze);
  border-radius:10px;background:linear-gradient(170deg,rgba(40,30,18,.9),rgba(16,11,7,.95));
  transition:.15s;position:relative;text-align:center}
.classcard:hover{border-color:var(--amber);transform:translateY(-4px);
  box-shadow:0 8px 22px rgba(0,0,0,.6),0 0 22px rgba(255,179,71,.25)}
.classcard.sel{border-color:var(--amber);box-shadow:0 0 0 2px var(--amber),0 0 26px rgba(255,179,71,.5)}
.classcard .ico{font-size:46px;line-height:1;margin-bottom:8px;filter:drop-shadow(0 0 8px rgba(255,179,71,.5))}
.classcard .cname{font-family:"Black Han Sans",sans-serif;font-size:22px;color:var(--amber-glow);margin-bottom:6px}
.classcard .cdesc{font-size:12px;color:#bdb08a;line-height:1.5;min-height:3em}
.classcard .stats{margin-top:10px;font-family:"Do Hyeon",sans-serif;font-size:11px;color:#9fc4b9;
  display:flex;justify-content:space-between;border-top:1px solid var(--bronze);padding-top:8px}

/* ===== OVERWORLD ===== */
#overworld{padding:0;background:url('assets/backgrounds/bg_wind_plain@2x.png') center/cover no-repeat #17110a}
#owcanvas{position:absolute;inset:0;width:100%;height:100%;image-rendering:auto;display:block;background:transparent}
.ow-hud{position:absolute;top:12px;left:12px;z-index:5;display:flex;gap:8px;align-items:center;
  background:rgba(14,10,7,.78);border:2px solid var(--brass-d);border-radius:8px;padding:7px 14px;
  font-family:"Do Hyeon",sans-serif;box-shadow:0 0 14px rgba(0,0,0,.5)}
.ow-hud .nm{color:var(--amber-glow);font-size:15px}
.ow-hud .lv{color:#9fc4b9;font-size:12px}
.ow-hint{position:absolute;bottom:14px;left:50%;transform:translateX(-50%);z-index:5;
  background:rgba(14,10,7,.7);border:1px solid var(--brass-d);border-radius:20px;
  padding:6px 16px;font-size:12px;color:#cbbd92;letter-spacing:.05em}

/* mobile dpad */
.dpad{position:absolute;bottom:26px;left:26px;z-index:6;width:138px;height:138px;display:none}
.dpad button{position:absolute;width:46px;height:46px;background:rgba(40,30,18,.85);
  border:2px solid var(--brass-d);border-radius:8px;color:var(--amber-glow);font-size:20px;
  display:flex;align-items:center;justify-content:center}
.dpad .up{top:0;left:46px}.dpad .dn{bottom:0;left:46px}.dpad .lf{top:46px;left:0}.dpad .rt{top:46px;right:0}

/* ===== ENCOUNTER FLASH ===== */
#flash{position:absolute;inset:0;z-index:30;display:none;background:#000;
  clip-path:circle(0% at 50% 50%)}

/* ===== BATTLE ===== */
#battle{padding:0;background:
  radial-gradient(ellipse at 50% 18%,#3a2c4a 0%,#1c1530 45%,#0a0712 100%)}
.bt-top{position:absolute;top:0;left:0;right:0;height:54%;display:flex;align-items:center;
  justify-content:center;gap:5%;z-index:2}
.enemy{display:flex;flex-direction:column;align-items:center;cursor:pointer;position:relative;
  transition:.12s}
.enemy.target{transform:scale(1.06)}
.enemy.target::after{content:"▼";position:absolute;top:-26px;color:var(--amber);font-size:22px;
  animation:bob .7s ease-in-out infinite;text-shadow:0 0 10px rgba(255,179,71,.9)}
@keyframes bob{0%,100%{transform:translateY(0)}50%{transform:translateY(6px)}}
.enemy canvas,.enemy img{image-rendering:auto;filter:drop-shadow(0 12px 14px rgba(0,0,0,.65))}
.enemy.hurt{animation:shake .35s}
.enemy.dead{animation:vanish .5s forwards}
@keyframes vanish{to{opacity:0;transform:scale(.4) translateY(20px)}}
@keyframes shake{0%,100%{transform:translateX(0)}25%{transform:translateX(-8px)}75%{transform:translateX(8px)}}
.enemy .enm-hp{margin-top:6px;width:74px;height:7px;background:#1a0f0f;border:1px solid #000;border-radius:4px;overflow:hidden}
.enemy .enm-hp i{display:block;height:100%;background:linear-gradient(90deg,#e74c3c,#ff7a5c);transition:.3s}
.enemy .enm-name{font-family:"Do Hyeon",sans-serif;font-size:12px;color:#e8d8b0;margin-top:3px;text-shadow:0 1px 2px #000}

.bt-mid{position:absolute;top:54%;left:0;right:0;z-index:3}
.msglog{margin:0 auto;width:min(620px,92vw);min-height:54px;
  background:rgba(10,7,12,.85);border:2px solid var(--brass-d);border-radius:8px;
  padding:12px 18px;font-size:clamp(14px,3vw,17px);color:#f0e4c2;line-height:1.5;
  box-shadow:0 0 18px rgba(0,0,0,.5),inset 0 0 20px rgba(0,0,0,.4)}

.bt-bot{position:absolute;bottom:0;left:0;right:0;display:flex;gap:10px;padding:10px;z-index:3;align-items:flex-end}
.party{display:flex;gap:8px;flex:1;flex-wrap:wrap}
.pcard{flex:1;min-width:120px;background:linear-gradient(170deg,rgba(36,27,16,.95),rgba(14,10,7,.97));
  border:2px solid var(--bronze);border-radius:8px;padding:8px 10px;position:relative;transition:.15s}
.pcard.active{border-color:var(--amber);box-shadow:0 0 0 1px var(--amber),0 0 18px rgba(255,179,71,.4)}
.pcard.dead{opacity:.4;filter:grayscale(1)}
.pcard.phurt{animation:shake .35s}
.pcard .ph{display:flex;align-items:center;gap:6px;margin-bottom:5px}
.pcard .ph .pi{font-size:18px}
.pcard .ph .pn{font-family:"Do Hyeon",sans-serif;font-size:14px;color:var(--amber-glow)}
.bar{height:9px;border-radius:4px;background:#1a0f0f;border:1px solid #000;overflow:hidden;margin-bottom:3px;position:relative}
.bar i{display:block;height:100%;transition:.35s}
.bar.hp i{background:linear-gradient(90deg,#2ec27a,#7af0a8)}
.bar.mp i{background:linear-gradient(90deg,#3a7bd5,#7ab8ff)}
.bar .lbl{position:absolute;right:4px;top:-1px;font-size:9px;color:#fff;
  font-family:"Do Hyeon",sans-serif;text-shadow:0 0 3px #000}

.cmds{display:flex;flex-direction:column;gap:6px;width:120px}
.cmd{cursor:pointer;font-family:"Do Hyeon",sans-serif;font-size:15px;letter-spacing:.05em;
  color:#1a120a;background:linear-gradient(180deg,#ffd874,#cda636);border:2px solid #7a5f1e;
  border-radius:7px;padding:9px 0;text-align:center;box-shadow:0 3px 0 #5b4418;transition:.1s;
  text-shadow:0 1px 0 rgba(255,255,255,.35)}
.cmd:hover{filter:brightness(1.08)}
.cmd:active{transform:translateY(2px);box-shadow:0 1px 0 #5b4418}
.cmd.dis{opacity:.4;pointer-events:none;filter:grayscale(.5)}
.cmd.back{background:none;color:var(--amber-glow);box-shadow:none;border-color:var(--brass-d)}

/* skill submenu */
.skillmenu{position:absolute;bottom:100%;left:0;margin-bottom:8px;width:200px;
  background:rgba(14,10,7,.96);border:2px solid var(--brass-d);border-radius:8px;padding:6px;
  display:none;box-shadow:0 0 20px rgba(0,0,0,.6)}
.skillmenu.show{display:block}
.skillmenu .sk{padding:8px 10px;border-radius:5px;cursor:pointer;font-family:"Do Hyeon",sans-serif;
  font-size:13px;color:#f0e4c2;display:flex;justify-content:space-between}
.skillmenu .sk:hover{background:rgba(255,179,71,.18)}
.skillmenu .sk.dis{opacity:.4;pointer-events:none}
.skillmenu .sk .cost{color:#7ab8ff}

/* floating dmg numbers */
.dmg{position:absolute;z-index:20;font-family:"Black Han Sans",sans-serif;font-size:30px;
  pointer-events:none;animation:dmgfly 1s ease-out forwards;text-shadow:0 2px 4px #000,0 0 8px currentColor}
@keyframes dmgfly{0%{transform:translateY(0) scale(.6);opacity:0}
  15%{transform:translateY(-14px) scale(1.15);opacity:1}
  100%{transform:translateY(-54px) scale(1);opacity:0}}

/* result overlay */
#result{position:absolute;inset:0;z-index:40;display:none;align-items:center;justify-content:center;
  background:rgba(0,0,0,.7);flex-direction:column}
#result .rbox{text-align:center;padding:30px 50px}
#result h2{font-family:"Black Han Sans",sans-serif;font-size:clamp(30px,8vw,60px);
  color:var(--amber-glow);text-shadow:0 3px 0 #6b521a,0 0 30px rgba(255,179,71,.6);margin-bottom:14px}
#result p{font-size:16px;color:#cbbd92;line-height:1.8}
#result.win h2{color:#ffe08a}
#result.lose h2{color:#e57373}

.fadeblk{position:absolute;inset:0;z-index:50;background:#000;opacity:0;pointer-events:none;transition:opacity .5s}
.fadeblk.on{opacity:1;pointer-events:all}
/* ===== ASSET PACK INTEGRATION ===== */
/* 직업 선택 쇼케이스 / 파티 카드 배틀러 썸네일 */
.ico-img{width:120px;height:150px;background-size:contain;background-position:center bottom;
  background-repeat:no-repeat;filter:drop-shadow(0 4px 8px rgba(0,0,0,.5))}
.pcard .pi-img{width:30px;height:30px;border-radius:6px;background-size:200%;
  background-position:center top;background-repeat:no-repeat;border:1px solid var(--bronze);
  background-color:#0e0a07}

/* 타이틀 배경 + 엠블럼 */
#title .title-backdrop{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;
  z-index:0;opacity:.55}
#title .title-logo{padding:30px 50px}
#title .emblem-bg{position:absolute;inset:-18% -12%;z-index:-1;background-size:100% 100%;
  background-repeat:no-repeat;opacity:.9;
  background-image:url('assets/ui/ui_title_emblem_bg@2x.png')}

/* 전투 배경 (이미지 위에 어둑한 오버레이) */
#battle{background:
  linear-gradient(180deg,rgba(10,8,16,.55),rgba(10,8,16,.15) 40%,rgba(10,8,16,.6)),
  url('assets/backgrounds/bg_wind_plain@2x.png') center/cover no-repeat,
  radial-gradient(ellipse at 50% 18%,#3a2c4a 0%,#1c1530 45%,#0a0712 100%)}

/* 버튼 9-slice (가로형 512x96) */
.btn,.cmd{
  border-image:url('assets/ui/ui_button_normal@2x.png') 30 fill / 24px / 0 stretch;
  background:rgba(28,20,11,.55);text-shadow:0 1px 2px rgba(0,0,0,.6);color:#fdebb8}
.btn:hover,.cmd:hover{
  border-image:url('assets/ui/ui_button_hover@2x.png') 30 fill / 24px / 0 stretch;filter:none}
.cmd.dis{border-image:url('assets/ui/ui_button_disabled@2x.png') 30 fill / 24px / 0 stretch;opacity:.85}
.btn:active,.cmd:active{transform:translateY(2px)}

/* 패널 9-slice */
.brass-frame{border-image:url('assets/ui/ui_panel_9slice@2x.png') 40 fill / 30px / 0 stretch;
  border-radius:0;box-shadow:0 10px 30px rgba(0,0,0,.6)}

/* 전투 메시지창 = 대화박스 스킨 */
.msglog{border:none;
  border-image:url('assets/ui/ui_dialog_box@2x.png') 60 fill / 34px / 0 stretch;
  background:rgba(10,7,12,.72);box-shadow:none}

/* 파티 HUD 프레임 */
.bt-bot .party{background-image:url('assets/ui/ui_hud_party_frame@2x.png');
  background-size:100% 100%;background-repeat:no-repeat;padding:14px 16px}
.pcard{background:rgba(20,14,9,.35);border-color:transparent}

/* HP/MP 바 채움 = 이미지 그라데이션 */
.bar.hp i{background:url('assets/ui/ui_bar_hp_fill@2x.png') center/100% 100% no-repeat}
.bar.mp i{background:url('assets/ui/ui_bar_mp_fill@2x.png') center/100% 100% no-repeat}


/* ===== V3 ART DIRECTION FIX ===== */
canvas,img{image-rendering:auto}
.screen::after{content:"";position:absolute;inset:0;pointer-events:none;z-index:1;
  background:radial-gradient(ellipse at center,transparent 42%,rgba(0,0,0,.35) 100%)}
.screen>*{position:relative;z-index:2}
#title .title-backdrop{opacity:.78;filter:saturate(1.08) contrast(1.04) brightness(.82)}
#title .mountains{display:none}
.title-logo{transform:scale(1.04)}
.title-main{filter:drop-shadow(0 12px 18px rgba(0,0,0,.75))}
.panel{background:rgba(13,9,6,.42);border-radius:18px;box-shadow:0 20px 60px rgba(0,0,0,.5)}
#classScreen{background:
  linear-gradient(180deg,rgba(8,6,4,.72),rgba(18,12,8,.9)),
  url('assets/backgrounds/bg_steam_city_brass_town@2x.png') center/cover no-repeat}
#classScreen .panel{width:min(980px,96vw)!important;padding:26px 28px 30px}
.classes{gap:20px;align-items:stretch}
.classcard{width:285px;min-height:410px;padding:16px 16px 18px;border-radius:18px;
  background:linear-gradient(180deg,rgba(34,24,14,.88),rgba(10,7,5,.96));
  border:1px solid rgba(212,175,55,.55);box-shadow:inset 0 0 0 1px rgba(255,220,130,.12),0 18px 34px rgba(0,0,0,.45);overflow:hidden}
.classcard::before{content:"";position:absolute;inset:6px;border:1px solid rgba(212,175,55,.28);border-radius:14px;pointer-events:none}
.classcard:hover{border-color:var(--amber);transform:translateY(-7px);box-shadow:0 22px 42px rgba(0,0,0,.65),0 0 28px rgba(255,179,71,.28)}
.classcard.sel{border-color:#ffe08a;box-shadow:0 0 0 2px rgba(255,224,138,.9),0 0 34px rgba(255,179,71,.5)}
.class-showcase{width:100%;height:230px;object-fit:contain;object-position:center bottom;display:block;margin:0 auto 6px;
  filter:drop-shadow(0 12px 10px rgba(0,0,0,.62))}
.classcard .cname{font-size:28px;color:#ffe4a0;text-shadow:0 2px 0 #432910,0 0 16px rgba(255,179,71,.35)}
.classcard .cdesc{font-size:14px;color:#e4d5ad;min-height:3.6em;padding:0 8px}
.classcard .stats{font-size:13px;color:#aad7c9;border-top:1px solid rgba(212,175,55,.32);padding:10px 7px 0;margin-top:10px}

<body>
<div id="game">

  <!-- ============ TITLE ============ -->
  <section id="title" class="screen active">
    <img class="title-backdrop" src="assets/backgrounds/bg_title_backdrop@2x.png" alt="" onerror="this.style.display='none'">
    <div class="mountains"></div>
    <div class="gear" style="width:220px;height:220px;top:-60px;left:-50px;animation:spin 24s linear infinite"></div>
    <div class="gear" style="width:160px;height:160px;top:30px;right:-40px;animation:spinrev 18s linear infinite"></div>
    <div class="gear" style="width:120px;height:120px;bottom:60px;left:8%;animation:spin 30s linear infinite"></div>
    <div class="title-logo">
      <div class="emblem-bg"></div>
      <div class="title-sub">STEAM &nbsp;·&nbsp; AETHER &nbsp;·&nbsp; ADVENTURE</div>
      <div class="title-main">용사가<br><span class="accent">되어라</span></div>
      <div class="title-en">— STEAM QUEST —</div>
    </div>
    <div class="title-menu" id="titleMenu">
      <button type="button" class="title-btn continue" id="continueBtn" hidden>↪ 이어하기</button>
      <button type="button" class="title-btn primary" id="startBtn">▶ 새로운 모험</button>
    </div>
    <div class="foot">© AETHER WORKS · DEMO v1.0</div>
  </section>

  <!-- ============ INTRO ============ -->
  <section id="intro" class="screen">
    <div class="intro-text" id="introText"></div>
  </section>

  <!-- ============ NAME ============ -->
  <section id="nameScreen" class="screen">
    <div class="gear" style="width:180px;height:180px;top:-40px;right:-30px;animation:spinrev 22s linear infinite"></div>
    <div class="panel brass-frame rivets">
      <h2>그대의 이름은?</h2>
      <p class="lead">눈을 뜬 그대여, 이름을 말해주오, 용사님…</p>
      <input id="nameInput" maxlength="8" placeholder="이름 입력" autocomplete="off">
      <br><span class="btn" id="nameOk">결정</span>
    </div>
  </section>

  <!-- ============ CLASS ============ -->
  <section id="classScreen" class="screen">
    <div class="gear" style="width:200px;height:200px;bottom:-50px;left:-40px;animation:spin 26s linear infinite"></div>
    <div class="panel" style="width:min(680px,94vw)">
      <h2>그대의 운명을 택하라</h2>
      <p class="lead">하나의 길을 고르면, 나머지 둘이 그대의 동료가 되리라.</p>
      <div class="classes" id="classRow"></div>
      <span class="btn" id="classOk" style="opacity:.4;pointer-events:none">출발</span>
    </div>
  </section>

  <!-- ============ OVERWORLD ============ -->
  <section id="overworld" class="screen">
    <canvas id="owcanvas"></canvas>
    <div class="ow-hud">
      <span style="font-size:18px">⚙️</span>
      <div><div class="nm" id="hudName">용사</div><div class="lv" id="hudLv">Lv.1</div></div>
    </div>
    
    <div class="dpad" id="dpad">
      <button class="up" data-d="up">▲</button>
      <button class="lf" data-d="left">◀</button>
      <button class="rt" data-d="right">▶</button>
      <button class="dn" data-d="down">▼</button>
    </div>

    <div id="encDlg">
      <div class="enc-box">
        <div class="enc-title" id="encTitle">슬라임이 길을 막아섰다!</div>
        <p class="enc-sub">전투를 시작하시겠습니까?</p>
        <div class="enc-btns">
          <span class="btn enc-fight" id="encFight">▶ 싸운다</span>
          <span class="btn enc-flee" id="encFlee">↩ 피한다</span>
        </div>
      </div>
    </div>
  </section>

  <!-- flash transition -->
  <div id="flash"></div>

  <!-- ============ BATTLE ============ -->
  <section id="battle" class="screen">
    <div class="ally-stage" id="allyStage"></div>
    <div class="bt-top" id="enemyRow"></div>

    <div id="result"><div class="rbox"><h2 id="resTitle"></h2><p id="resBody"></p><br><span class="btn" id="resBtn">계속</span></div></div>
  </section>

  <div class="fadeblk" id="fade"></div>

  <!-- steam wisps -->
  <div class="steam" style="left:12%;animation-delay:0s"></div>
  <div class="steam" style="left:38%;animation-delay:2.5s"></div>
  <div class="steam" style="left:68%;animation-delay:4s"></div>
  <div class="steam" style="left:88%;animation-delay:1.2s"></div>
</div>

<script>
//=================================================================
//  STEAM QUEST — single-file JRPG demo
//=================================================================
const $=s=>document.querySelector(s);
const $$=s=>[...document.querySelectorAll(s)];
const G={player:{name:"용사",cls:null,lv:1,exp:0,gold:0},party:[]};
const VIS_SCALE={warrior:1.08,mage:1.0,archer:0.94};

//---------------- ASSET LOADER ----------------
// 이미지가 있으면 사용, 없으면(미리보기 등) 기존 캔버스 드로잉으로 자동 폴백
const ASSETS="assets/";
const IMG={};
function loadImg(key,path){
  const im=new Image();im._ok=false;
  im.onload=()=>{im._ok=true;};
  im.onerror=()=>{im._ok=false;};
  im.src=ASSETS+path;IMG[key]=im;return im;
}
// characters
["warrior","mage","archer"].forEach(c=>{
  loadImg("walk_"+c,`characters/char_${c}_walk@2x.png`);
  loadImg("battler_"+c,`characters/battler_${c}@2x.png`);
  loadImg("show_"+c,`characters/showcase_${c}@2x.png`);
});
// monsters
loadImg("slime_brass_field","monsters/mon_slime_brass_field@2x.png");
loadImg("slime_cog_field","monsters/mon_slime_cog_field@2x.png");
loadImg("slime_brass","monsters/mon_slime_brass@2x.png");
loadImg("slime_cog","monsters/mon_slime_cog@2x.png");
// backgrounds
loadImg("bg_wind_plain","backgrounds/bg_wind_plain@2x.png");
loadImg("bg_steam_city","backgrounds/bg_steam_city_brass_town@2x.png");
function ready(k){return IMG[k]&&IMG[k]._ok;}
const CLS_WALK={warrior:"walk_warrior",mage:"walk_mage",archer:"walk_archer"};
const DIR_ROW={down:0,up:1,left:2,right:3};

function show(id){$$(".screen").forEach(s=>s.classList.remove("active"));$("#"+id).classList.add("active");}
function fade(on){const f=$("#fade");return new Promise(r=>{if(on){f.classList.add("on");}else{f.classList.remove("on");}setTimeout(r,520);});}

//---------------- CLASS DATA ----------------
const CLASSES={
  warrior:{key:"warrior",name:"전사",ico:"⚔️",color:"#e0793c",
    desc:"증기 갑주를 두른 전열의 방패. 강인한 체력과 파괴력.",
    base:{hp:62,mp:8,atk:18,def:13,spd:8,mag:2},
    skills:[{id:"smash",name:"강타",cost:5,type:"phys",pow:1.7,desc:"강력한 일격"}]},
  mage:{key:"mage",name:"법사",ico:"🔮",color:"#7a8bff",
    desc:"에테르를 다루는 톱니 마도사. 화염과 치유의 술법.",
    base:{hp:34,mp:32,atk:8,def:6,spd:10,mag:18},
    skills:[
      {id:"fire",name:"화염구",cost:6,type:"mag",pow:1.6,desc:"불꽃 폭발"},
      {id:"heal",name:"치유",cost:7,type:"heal",pow:22,desc:"아군 회복"}]},
  archer:{key:"archer",name:"궁수",ico:"🏹",color:"#54c98a",
    desc:"증기 노궁을 든 사냥꾼. 빠른 손과 연속 사격.",
    base:{hp:46,mp:14,atk:15,def:8,spd:15,mag:6},
    skills:[{id:"rapid",name:"연사",cost:6,type:"phys2",pow:0.75,desc:"2회 사격"}]},
};

//---------------- TITLE ----------------
$("#startBtn").addEventListener("click",startGame);

//---------------- SAVE SYSTEM (localStorage) ----------------
const SAVE_KEY="steamquest_save_v1";
function canStore(){try{localStorage.setItem("__t","1");localStorage.removeItem("__t");return true;}catch(e){return false;}}
function saveGame(){
  if(!canStore())return false;
  try{
    const data={v:1,player:G.player,
      party:G.party.map(p=>({cls:p.cls,name:p.name,isHero:p.isHero,
        maxhp:p.maxhp,hp:p.hp,maxmp:p.maxmp,mp:p.mp,atk:p.atk,def:p.def,spd:p.spd,mag:p.mag,alive:p.alive})),
      ow:{px:ow.px,py:ow.py,worldW:ow.worldW,worldH:ow.worldH,
        slimes:(ow.slimes||[]).map(s=>({x:s.x,y:s.y,bx:s.bx,by:s.by,type:s.type,alive:s.alive}))},
      ts:Date.now()};
    localStorage.setItem(SAVE_KEY,JSON.stringify(data));return true;
  }catch(e){return false;}
}
function loadSave(){try{const r=localStorage.getItem(SAVE_KEY);return r?JSON.parse(r):null;}catch(e){return null;}}
function hasSave(){return !!loadSave();}
function clearSave(){try{localStorage.removeItem(SAVE_KEY);}catch(e){}}

(function initTitleSave(){
  const cb=$("#continueBtn");if(!cb)return;
  cb.hidden=!hasSave();
  cb.addEventListener("click",continueGame);
})();

async function startGame(){
  if(hasSave()){
    if(!confirm("새로 시작하면 기존 저장이 사라집니다. 계속할까요?"))return;
    clearSave();const cb=$("#continueBtn");if(cb)cb.hidden=true;
  }
  await fade(true);show("intro");await fade(false);runIntro();
}

async function continueGame(){
  const s=loadSave();if(!s)return;
  await fade(true);
  G.player=Object.assign({name:"용사",cls:null,lv:1,exp:0,gold:0},s.player);
  G.party=(s.party||[]).map(sp=>{
    const c=CLASSES[sp.cls];
    return {cls:sp.cls,clsName:c.name,name:sp.name,ico:c.ico,color:c.color,isHero:sp.isHero,
      maxhp:sp.maxhp,hp:sp.hp,maxmp:sp.maxmp,mp:sp.mp,atk:sp.atk,def:sp.def,spd:sp.spd,mag:sp.mag,
      skills:c.skills,alive:sp.alive,defending:false};
  });
  $("#hudName").textContent=G.player.name;
  $("#hudLv").textContent="Lv."+G.player.lv;
  initOverworld(s.ow);
  show("overworld");await fade(false);
  toast("모험을 이어간다 — Lv."+G.player.lv);
}

//---------------- INTRO ----------------
async function runIntro(){
  const el=$("#introText");el.textContent="";
  const lines=["…………","………… 차갑다.","…여기는… 어디지?","희미한 증기 소리, 낯선 하늘.","— 누군가 나를 부르고 있다."];
  for(const line of lines){await typeLine(el,line);await wait(700);}
  await wait(500);await fade(true);
  show("nameScreen");await fade(false);
  setTimeout(()=>$("#nameInput").focus(),200);
}
function typeLine(el,text){return new Promise(res=>{
  el.innerHTML="";let i=0;
  const tick=()=>{el.innerHTML=text.slice(0,i)+'<span class="cursor-blink">▌</span>';
    if(i<text.length){i++;setTimeout(tick,text[i-1]===" "?40:65);}else res();};
  tick();
});}

//---------------- NAME ----------------
$("#nameOk").addEventListener("click",confirmName);
$("#nameInput").addEventListener("keydown",e=>{if(e.key==="Enter")confirmName();});
async function confirmName(){
  let n=$("#nameInput").value.trim();if(!n)n="용사";
  G.player.name=n;
  await fade(true);buildClasses();show("classScreen");await fade(false);
}

//---------------- CLASS SELECT ----------------
let pickedCls=null;
function buildClasses(){
  const row=$("#classRow");row.innerHTML="";pickedCls=null;
  for(const k of ["warrior","mage","archer"]){
    const c=CLASSES[k];
    const card=document.createElement("div");card.className="classcard";card.dataset.k=k;
    const sk="show_"+k;
    const src=(IMG[sk]&&IMG[sk].src)||`assets/characters/showcase_${k}@2x.png`;
    const ico=`<img class="class-showcase" src="${src}" alt="${c.name}" draggable="false">`;
    card.innerHTML=`${ico}<div class="cname">${c.name}</div>
      <div class="cdesc">${c.desc}</div>
      <div class="stats"><span>HP ${c.base.hp}</span><span>ATK ${c.base.atk}</span><span>SPD ${c.base.spd}</span></div>`;
    card.addEventListener("click",()=>{
      pickedCls=k;$$(".classcard").forEach(x=>x.classList.remove("sel"));card.classList.add("sel");
      $("#classOk").style.opacity=1;$("#classOk").style.pointerEvents="auto";
    });
    row.appendChild(card);
  }
}
$("#classOk").addEventListener("click",confirmClass);
async function confirmClass(){
  if(!pickedCls)return;
  G.player.cls=pickedCls;
  // build party: chosen class = player (named), others = companions
  const order=["warrior","mage","archer"];
  G.party=[];
  // chosen first
  G.party.push(makeMember(pickedCls,G.player.name,true));
  // companions
  const compNames={warrior:"가렛",mage:"이졸데",archer:"핀"};
  for(const k of order){if(k!==pickedCls)G.party.push(makeMember(k,compNames[k],false));}
  $("#hudName").textContent=G.player.name;
  await fade(true);initOverworld();saveGame();show("overworld");await fade(false);
  toast("증기 초원 — 길과 공터를 따라 슬라임이 배회한다. (자동 저장됨)");
}
function makeMember(clsKey,name,isHero){
  const c=CLASSES[clsKey];const b=c.base;
  return {cls:clsKey,clsName:c.name,name,ico:c.ico,color:c.color,isHero,
    maxhp:b.hp,hp:b.hp,maxmp:b.mp,mp:b.mp,atk:b.atk,def:b.def,spd:b.spd,mag:b.mag,
    skills:c.skills,alive:true,defending:false};
}

//=================================================================
//  OVERWORLD  (top-down canvas)
//=================================================================
const ow={cv:null,ctx:null,W:0,H:0,worldW:1920,worldH:1080,
  px:960,py:760,pdir:"down",pframe:0,frameT:0,speed:2.4,
  walkMinX:120,walkMaxX:1800,walkMinY:585,walkMaxY:980,
  blocks:[
    {x:130,y:180,w:420,h:340},   // left hill building
    {x:1090,y:240,w:560,h:360},  // house + windmill hill
    {x:0,y:835,w:250,h:245},     // bottom-left boiler
    {x:1330,y:875,w:280,h:205},  // bottom-right gear cluster
    {x:1540,y:620,w:260,h:160}   // right path post / cliff edge
  ],
  keys:{},slimes:[],cam:{x:0,y:0},encounterCD:0,active:false,bushes:[],raf:0};

function initOverworld(saved){
  ow.cv=$("#owcanvas");ow.ctx=ow.cv.getContext("2d");
  resizeOW();window.addEventListener("resize",resizeOW);
  if(saved){
    ow.worldW=saved.worldW||ow.worldW;ow.worldH=saved.worldH||ow.worldH;
    ow.px=saved.px;ow.py=saved.py;
  }else{ow.px=Math.round(ow.worldW*0.52);ow.py=Math.round(ow.worldH*0.76);}
  sanitizePosition(ow);
  ow.active=true;ow.encounterCD=40;
  // v7 curated field spawns: always rebuild so monsters stay on open paths and never clip into scenery.
  ow.slimes=[];
  const seeds=[
    {x:335,y:705,type:"brass"},
    {x:520,y:695,type:"brass"},
    {x:730,y:760,type:"brass"},
    {x:980,y:680,type:"brass"},
    {x:1160,y:715,type:"brass"},
    {x:1410,y:770,type:"brass"},
    {x:690,y:910,type:"cog"},
    {x:1060,y:905,type:"cog"},
    {x:1320,y:920,type:"brass"}
  ];
  seeds.forEach(sp=>{
    ow.slimes.push({x:sp.x,y:sp.y,bx:sp.x,by:sp.y,type:sp.type,
      t:Math.random()*6,wob:Math.random()*6,alert:0,alive:true,
      vx:(Math.random()-.5)*0.55,vy:(Math.random()-.35)*0.45});
  });
  // decorative props intentionally disabled in v5 for cleaner staging
  ow.bushes=[];
  if('ontouchstart'in window)$("#dpad").style.display="block";
  cancelAnimationFrame(ow.raf);loopOW();
}
function resizeOW(){if(!ow.cv)return;ow.W=ow.cv.width=window.innerWidth;ow.H=ow.cv.height=window.innerHeight;}
function pointInBlock(x,y,b,pad=0){return x>b.x-pad && x<b.x+b.w+pad && y>b.y-pad && y<b.y+b.h+pad;}
function isWalkable(x,y,pad=10){
  if(x<ow.walkMinX||x>ow.walkMaxX||y<ow.walkMinY||y>ow.walkMaxY)return false;
  for(const b of ow.blocks){if(pointInBlock(x,y,b,pad))return false;}
  return true;
}
function sanitizePosition(o){
  if(isWalkable(o.px,o.py,18)) return;
  let best={x:Math.max(ow.walkMinX,Math.min(ow.walkMaxX,o.px)),y:Math.max(ow.walkMinY,Math.min(ow.walkMaxY,o.py))}, bestD=1e18;
  for(let yy=ow.walkMinY; yy<=ow.walkMaxY; yy+=14){
    for(let xx=ow.walkMinX; xx<=ow.walkMaxX; xx+=14){
      if(!isWalkable(xx,yy,18)) continue;
      const d=(xx-o.px)*(xx-o.px)+(yy-o.py)*(yy-o.py);
      if(d<bestD){bestD=d; best={x:xx,y:yy};}
    }
  }
  o.px=best.x; o.py=best.y;
}

// input
window.addEventListener("keydown",e=>{ow.keys[e.key.toLowerCase()]=true;
  if(["arrowup","arrowdown","arrowleft","arrowright"," "].includes(e.key.toLowerCase()))e.preventDefault();});
window.addEventListener("keyup",e=>{ow.keys[e.key.toLowerCase()]=false;});
$$("#dpad button").forEach(b=>{
  const d=b.dataset.d;const set=v=>{ow.touchDir=v?d:null;};
  b.addEventListener("touchstart",e=>{e.preventDefault();set(true);});
  b.addEventListener("touchend",e=>{e.preventDefault();set(false);});
  b.addEventListener("mousedown",()=>set(true));b.addEventListener("mouseup",()=>set(false));
  b.addEventListener("mouseleave",()=>set(false));
});

function loopOW(){
  if(!ow.active){return;}
  updateOW();drawOW();
  ow.raf=requestAnimationFrame(loopOW);
}
function updateOW(){
  let dx=0,dy=0;const k=ow.keys;
  if(k["arrowup"]||k["w"]||ow.touchDir==="up")dy-=1;
  if(k["arrowdown"]||k["s"]||ow.touchDir==="down")dy+=1;
  if(k["arrowleft"]||k["a"]||ow.touchDir==="left")dx-=1;
  if(k["arrowright"]||k["d"]||ow.touchDir==="right")dx+=1;
  const moving=dx||dy;
  if(moving){
    const m=Math.hypot(dx,dy)||1;dx/=m;dy/=m;
    const nx=ow.px+dx*ow.speed*2.2, ny=ow.py+dy*ow.speed*2.2;
    if(isWalkable(nx,ny,18)){ow.px=nx;ow.py=ny;}
    else if(isWalkable(nx,ow.py,18)){ow.px=nx;}
    else if(isWalkable(ow.px,ny,18)){ow.py=ny;}
    if(Math.abs(dx)>Math.abs(dy))ow.pdir=dx>0?"right":"left";else ow.pdir=dy>0?"down":"up";
    ow.frameT++;if(ow.frameT>8){ow.frameT=0;ow.pframe=(ow.pframe+1)%4;}
  }else ow.pframe=0;
  // camera
  // 뷰포트가 월드보다 크면 가운데 정렬(바깥은 레터박스), 작으면 일반 스크롤
  ow.cam.x=(ow.W>=ow.worldW)?(ow.worldW-ow.W)/2:Math.max(0,Math.min(ow.worldW-ow.W,ow.px-ow.W/2));
  ow.cam.y=(ow.H>=ow.worldH)?(ow.worldH-ow.H)/2:Math.max(0,Math.min(ow.worldH-ow.H,ow.py-ow.H/2));
  // slimes wander + proximity
  if(ow.encounterCD>0)ow.encounterCD--;
  for(const s of ow.slimes){
    if(!s.alive)continue;
    s.t+=0.05;s.wob+=0.12;
    // wander
    const sx=s.x+s.vx*0.5, sy=s.y+s.vy*0.5;
    if(isWalkable(sx,sy,12)){s.x=sx;s.y=sy;}
    else{s.vx*=-0.8;s.vy*=-0.8;}
    if(Math.hypot(s.x-s.bx,s.y-s.by)>52){s.vx+=(s.bx-s.x)*0.006;s.vy+=(s.by-s.y)*0.006;}
    if(Math.random()<0.012){s.vx+=(Math.random()-.5)*0.45;s.vy+=(Math.random()-.35)*0.35;}
    s.vx=Math.max(-0.9,Math.min(0.9,s.vx));s.vy=Math.max(-0.7,Math.min(0.7,s.vy));
    const d=Math.hypot(s.x-ow.px,s.y-ow.py);
    if(d<165){s.alert=Math.min(1,s.alert+0.08);}else{s.alert=Math.max(0,s.alert-0.04);}
    if(d<82&&ow.encounterCD<=0){askEncounter(s);}
  }
}

//---------------- pixel drawing helpers ----------------
function px(ctx,x,y,w,h,c){ctx.fillStyle=c;ctx.fillRect(x|0,y|0,w,h);}

function drawHero(ctx,x,y,dir,frame){
  // 이미지 시트가 준비됐으면 크게 그려 시안의 디테일을 살린다.
  const key=CLS_WALK[G.player.cls]||"walk_warrior";
  if(ready(key)){
    const sheet=IMG[key];const cell=192;
    const classScale=VIS_SCALE[G.player.cls]||1;
    const disp=Math.round(Math.max(144,Math.min(172,Math.round(Math.min(ow.W,ow.H)*0.225)))*classScale);
    const col=frame&3,row=DIR_ROW[dir]||0;
    ctx.save();
    ctx.imageSmoothingEnabled=true;
    ctx.imageSmoothingQuality="high";
    ctx.fillStyle="rgba(0,0,0,.36)";
    ctx.filter="blur(1.5px)";
    ctx.beginPath();ctx.ellipse(x,y+13,disp*.31,disp*.075,0,0,Math.PI*2);ctx.fill();
    ctx.filter="none";
    ctx.drawImage(sheet,col*cell,row*cell,cell,cell, x-disp/2, y-disp+26, disp,disp);
    ctx.restore();
    return;
  }
  // ---- fallback: 기존 픽셀 드로잉 ----
  // 16x18-ish steampunk hero, scaled 3x
  const S=3;ctx.save();ctx.translate(x-8*S,y-14*S);
  const skin="#e8b98a",hair="#5b3a1c",coat="#7a4a24",coatD="#5e3818",
        metal="#cdb15a",metalD="#9c8336",boot="#3a2a18",pack="#4a4a52";
  // shadow
  ctx.fillStyle="rgba(0,0,0,.28)";ctx.beginPath();ctx.ellipse(8*S,17*S,8*S,3*S,0,0,7);ctx.fill();
  const bob=(frame===1||frame===3)?S:0;
  // legs
  const lp=frame%2?2:-2;
  px(ctx,5*S,14*S-bob,3*S,3*S,boot);px(ctx,8*S,14*S-bob,3*S,3*S,boot);
  // body coat
  px(ctx,4*S,8*S-bob,8*S,7*S,coat);
  px(ctx,4*S,8*S-bob,8*S,2*S,metal); // chest plate
  px(ctx,7*S,8*S-bob,2*S,7*S,coatD);
  // backpack hint
  if(dir==="up")px(ctx,5*S,7*S-bob,6*S,5*S,pack);
  // arms
  px(ctx,2*S,9*S-bob,2*S,4*S,coat);px(ctx,12*S,9*S-bob,2*S,4*S,coat);
  // head
  px(ctx,5*S,3*S-bob,6*S,6*S,skin);
  px(ctx,5*S,2*S-bob,6*S,2*S,hair);
  px(ctx,4*S,3*S-bob,1*S,2*S,hair);px(ctx,11*S,3*S-bob,1*S,2*S,hair);
  // goggles (steampunk!)
  px(ctx,5*S,3*S-bob,6*S,1*S,metalD);
  if(dir!=="up"){px(ctx,5*S,4*S-bob,2*S,1*S,metal);px(ctx,9*S,4*S-bob,2*S,1*S,metal);}
  // face dir
  if(dir==="down"){px(ctx,6*S,6*S-bob,1*S,1*S,"#3a2a1a");px(ctx,9*S,6*S-bob,1*S,1*S,"#3a2a1a");}
  if(dir==="left"){px(ctx,5*S,6*S-bob,1*S,1*S,"#3a2a1a");}
  if(dir==="right"){px(ctx,10*S,6*S-bob,1*S,1*S,"#3a2a1a");}
  // sword on back
  px(ctx,11*S,4*S-bob,1*S,8*S,metalD);px(ctx,11*S,4*S-bob,1*S,2*S,metal);
  ctx.restore();
}

function drawSlime(ctx,x,y,type,wob,t){
  const S=3;ctx.save();ctx.translate(x,y);
  const sq=Math.sin(wob)*0.12;
  const w=(11+Math.sin(wob)*1.5),h=(8-Math.sin(wob)*1.2);
  let body,bodyD,hi;
  if(type==="brass"){body="#c8962f";bodyD="#8f6818";hi="#ffd87a";}
  else{body="#7d8a8f";bodyD="#4f595d";hi="#c4d2d6";}
  ctx.fillStyle="rgba(0,0,0,.28)";ctx.beginPath();ctx.ellipse(0,2*S,w*S*.7,3*S,0,0,7);ctx.fill();
  // body
  ctx.fillStyle=body;
  ctx.beginPath();ctx.moveTo(-w*S,2*S);
  ctx.quadraticCurveTo(-w*S,-h*S*1.4,0,-h*S*1.4);
  ctx.quadraticCurveTo(w*S,-h*S*1.4,w*S,2*S);
  ctx.closePath();ctx.fill();
  ctx.fillStyle=bodyD;ctx.fillRect(-w*S,1*S,w*2*S,1.5*S);
  // highlight
  ctx.fillStyle=hi;ctx.beginPath();ctx.ellipse(-3*S,-4*S,2*S,1.4*S,0,0,7);ctx.fill();
  // eyes
  ctx.fillStyle="#1a120a";px(ctx,-4*S,-3*S,1.4*S,2*S,"#1a120a");px(ctx,2.6*S,-3*S,1.4*S,2*S,"#1a120a");
  ctx.fillStyle="#fff";px(ctx,-3.8*S,-3*S,.7*S,.8*S,"#fff");px(ctx,2.8*S,-3*S,.7*S,.8*S,"#fff");
  // steampunk topper: brass bolt / gear
  if(type==="cog"){
    ctx.save();ctx.translate(0,-h*S*1.4);ctx.rotate(t);
    ctx.fillStyle="#caa23a";for(let i=0;i<6;i++){ctx.rotate(Math.PI/3);ctx.fillRect(-1*S,-3*S,2*S,2*S);}
    ctx.beginPath();ctx.arc(0,0,1.6*S,0,7);ctx.fill();ctx.restore();
  }else{
    px(ctx,-1*S,-h*S*1.4-1*S,2*S,2*S,"#ffe7a0");
  }
  ctx.restore();
}

function drawOW(){
  const ctx=ow.ctx,cx=ow.cam.x,cy=ow.cam.y;
  ctx.fillStyle="#0a0806";ctx.fillRect(0,0,ow.W,ow.H);   // 매 프레임 클리어(잔상 방지)
  ctx.imageSmoothingEnabled=true;
  ctx.imageSmoothingQuality="high";
  // painterly overworld background (asset pack style)
  if(ready("bg_wind_plain")){
    // 승인 시안에서 추출한 회화풍 배경을 맵 전체에 사용
    ctx.drawImage(IMG.bg_wind_plain,0,0,IMG.bg_wind_plain.width,IMG.bg_wind_plain.height,
      -cx,-cy,ow.worldW,ow.worldH);
    // subtle playable-lane emphasis so the hero feels grounded
    const lane=ctx.createLinearGradient(0,ow.H*0.38,0,ow.H);
    lane.addColorStop(0,"rgba(255,255,255,0)");
    lane.addColorStop(.55,"rgba(255,234,180,.03)");
    lane.addColorStop(1,"rgba(62,46,20,.10)");
    ctx.fillStyle=lane;ctx.fillRect(0,0,ow.W,ow.H);
    const grad=ctx.createLinearGradient(0,0,0,ow.H);
    grad.addColorStop(0,"rgba(255,240,185,.08)");
    grad.addColorStop(.55,"rgba(0,0,0,0)");
    grad.addColorStop(1,"rgba(0,0,0,.22)");
    ctx.fillStyle=grad;ctx.fillRect(0,0,ow.W,ow.H);
  }else{
    const tile=48;
    for(let gx=Math.floor(cx/tile)*tile;gx<cx+ow.W+tile;gx+=tile){
      for(let gy=Math.floor(cy/tile)*tile;gy<cy+ow.H+tile;gy+=tile){
        const even=((gx/tile)+(gy/tile))%2===0;
        ctx.fillStyle=even?"#3a6e3a":"#356635";
        ctx.fillRect(gx-cx,gy-cy,tile,tile);
      }
    }
  }
  // vignette-ish darker edges of world
  // decorations: 시안 배경 위에서는 너무 튀지 않게 낮은 알파로만 얹는다.
  ctx.save();
  ctx.globalAlpha=ready("bg_wind_plain")?0.38:1;
  for(const b of ow.bushes){
    const sx=b.x-cx,sy=b.y-cy;
    if(sx<-60||sx>ow.W+60||sy<-60||sy>ow.H+60)continue;
    if(b.k==="bush"){
      ctx.fillStyle="rgba(0,0,0,.2)";ctx.beginPath();ctx.ellipse(sx,sy+8*b.s,16*b.s,5*b.s,0,0,7);ctx.fill();
      ctx.fillStyle="#2c5a2c";ctx.beginPath();ctx.arc(sx,sy,14*b.s,0,7);ctx.fill();
      ctx.fillStyle="#3f7a3f";ctx.beginPath();ctx.arc(sx-5*b.s,sy-3*b.s,8*b.s,0,7);ctx.fill();
    }else if(b.k==="flower"){
      ctx.fillStyle="#caa23a";ctx.beginPath();ctx.arc(sx,sy,3*b.s,0,7);ctx.fill();
      ctx.fillStyle="#e8d8b0";for(let i=0;i<5;i++){const a=i/5*7;ctx.beginPath();ctx.arc(sx+Math.cos(a)*5*b.s,sy+Math.sin(a)*5*b.s,2.5*b.s,0,7);ctx.fill();}
      ctx.fillStyle="#ffcf6e";ctx.beginPath();ctx.arc(sx,sy,2.5*b.s,0,7);ctx.fill();
    }else{ // half-buried gear
      ctx.save();ctx.translate(sx,sy);ctx.rotate(b.seed);
      ctx.fillStyle="#6b5a2e";for(let i=0;i<8;i++){ctx.rotate(Math.PI/4);ctx.fillRect(-2*b.s,-11*b.s,4*b.s,4*b.s);}
      ctx.beginPath();ctx.arc(0,0,8*b.s,0,7);ctx.fill();
      ctx.fillStyle="#4a3f20";ctx.beginPath();ctx.arc(0,0,3*b.s,0,7);ctx.fill();ctx.restore();
    }
  }
  ctx.restore();
  // slimes (depth sort with hero by y)
  const ents=[];
  for(const s of ow.slimes)if(s.alive)ents.push({y:s.y,kind:"s",ref:s});
  ents.push({y:ow.py,kind:"h"});
  ents.sort((a,b)=>a.y-b.y);
  for(const e of ents){
    if(e.kind==="s"){const s=e.ref;
      const sk=s.type==="brass"?"slime_brass_field":"slime_cog_field";
      if(ready(sk)){const depth=(s.y-ow.walkMinY)/Math.max(1,(ow.walkMaxY-ow.walkMinY));const sz=Math.round(118+depth*30);ctx.save();ctx.fillStyle="rgba(0,0,0,.34)";ctx.filter="blur(1.5px)";ctx.beginPath();ctx.ellipse(s.x-cx,s.y-cy+13,sz*.36,sz*.085,0,0,Math.PI*2);ctx.fill();ctx.filter="none";ctx.drawImage(IMG[sk],s.x-cx-sz/2,s.y-cy-sz+24,sz,sz);ctx.restore();}
      else drawSlime(ctx,s.x-cx,s.y-cy,s.type,s.wob,s.t);
      if(s.alert>0.15){ // ! mark
        const ax=s.x-cx,ay=s.y-cy-44;
        ctx.globalAlpha=s.alert;
        ctx.fillStyle="#ffcf3a";ctx.font="bold 30px 'Black Han Sans',sans-serif";ctx.textAlign="center";
        ctx.fillText("!",ax,ay);
        ctx.strokeStyle="#7a2a0a";ctx.lineWidth=2;ctx.strokeText("!",ax,ay);
        ctx.globalAlpha=1;
      }
    }else{
      drawHero(ctx,ow.px-cx,ow.py-cy,ow.pdir,ow.pframe);
    }
  }
  // 레터박스/필러박스: 월드(1920x1080) 바깥 여백을 어둡게 덮어 가운데 정렬
  const _wl=-cx,_wr=ow.worldW-cx,_wt=-cy,_wb=ow.worldH-cy;
  ctx.fillStyle="#0a0806";
  if(_wl>0)ctx.fillRect(0,0,_wl,ow.H);
  if(_wr<ow.W)ctx.fillRect(_wr,0,ow.W-_wr,ow.H);
  if(_wt>0)ctx.fillRect(0,0,ow.W,_wt);
  if(_wb<ow.H)ctx.fillRect(0,_wb,ow.W,ow.H-_wb);
}

function toast(t){const h=$("#owHint");if(h)h.textContent=t;}

//=================================================================
//  ENCOUNTER CONFIRM (전투 진행 여부 확인)
//=================================================================
let encActive=false;
function askEncounter(slime){
  if(encActive)return;
  encActive=true;pendingEnemy=slime;slime.alert=1;
  ow.active=false;cancelAnimationFrame(ow.raf);
  try{drawOW();}catch(e){}   // 느낌표(!)가 보이도록 마지막 프레임 한 번 더 그림
  const name=(ENEMY_TYPES[slime.type]&&ENEMY_TYPES[slime.type].name)||"슬라임";
  $("#encTitle").textContent=name+"이(가) 길을 막아섰다!";
  $("#encDlg").classList.add("show");
}
function fightEncounter(){
  if(!encActive)return;const s=pendingEnemy;
  encActive=false;$("#encDlg").classList.remove("show");
  ow.active=true;                 // triggerEncounter의 가드 통과용
  triggerEncounter(s);
}
function fleeEncounter(){
  if(!encActive)return;const s=pendingEnemy;
  encActive=false;$("#encDlg").classList.remove("show");
  if(s){ // 슬라임을 살짝 밀어내고 잠시 재조우 방지
    const ang=Math.atan2(s.y-ow.py,s.x-ow.px);
    s.x=Math.max(ow.walkMinX,Math.min(ow.walkMaxX,ow.px+Math.cos(ang)*155));
    s.y=Math.max(ow.walkMinY,Math.min(ow.walkMaxY,ow.py+Math.sin(ang)*125));
    s.bx=s.x;s.by=s.y;s.alert=0;
  }
  pendingEnemy=null;ow.encounterCD=150;
  ow.active=true;cancelAnimationFrame(ow.raf);loopOW();
}
(function bindEncounter(){
  const f=$("#encFight"),g=$("#encFlee");
  if(f)f.addEventListener("click",fightEncounter);
  if(g)g.addEventListener("click",fleeEncounter);
  window.addEventListener("keydown",e=>{
    if(!encActive)return;
    if(e.key==="Enter"){e.preventDefault();fightEncounter();}
    else if(e.key==="Escape"){e.preventDefault();fleeEncounter();}
  });
})();

//=================================================================
//  ENCOUNTER TRANSITION (Dragon Quest style)
//=================================================================
let pendingEnemy=null;
async function triggerEncounter(slime){
  if(!ow.active)return;ow.active=false;cancelAnimationFrame(ow.raf);
  pendingEnemy=slime;
  slime.alert=1;
  // freeze + flash sequence
  const fl=$("#flash");fl.style.display="block";fl.style.background="#fff";
  // quick white double-flash
  fl.style.clipPath="circle(150% at 50% 50%)";fl.style.transition="none";fl.style.opacity="0";
  await wait(20);
  for(let i=0;i<2;i++){fl.style.opacity="0.85";await wait(90);fl.style.opacity="0";await wait(90);}
  // diamond/iris collapse to black
  fl.style.background="#000";fl.style.opacity="1";
  fl.style.transition="clip-path .55s ease-in";
  fl.style.clipPath="circle(150% at 50% 50%)";
  await wait(30);fl.style.clipPath="circle(0% at 50% 50%)";
  await wait(560);
  // now actually start battle behind black, then iris open
  startBattle(slime);
  show("battle");
  fl.style.clipPath="circle(0% at 50% 50%)";
  await wait(40);fl.style.clipPath="circle(150% at 50% 50%)";
  await wait(560);fl.style.display="none";fl.style.transition="none";
}

//=================================================================
//  BATTLE ENGINE
//=================================================================
const B={enemies:[],turnQueue:[],idx:0,curMember:null,busy:false,over:false,fleeOK:true};

const ENEMY_TYPES={
  brass:{name:"황동 슬라임",type:"brass",hp:24,atk:9,def:4,spd:6,exp:8,gold:5},
  cog:{name:"톱니 슬라임",type:"cog",hp:40,atk:13,def:7,spd:9,exp:18,gold:12},
};

function startBattle(slime){
  B.over=false;B.busy=false;
  // build enemy group: the touched slime + maybe 1-2 more
  const n=1+Math.floor(Math.random()*2)+(slime.type==="cog"?0:1);
  B.enemies=[];
  const baseType=slime.type;
  for(let i=0;i<Math.min(n,3);i++){
    const t=(i===0)?baseType:(Math.random()<.3?"cog":"brass");
    const d=ENEMY_TYPES[t];
    B.enemies.push({...d,maxhp:d.hp,hp:d.hp,alive:true,id:"e"+i,wob:Math.random()*6,t:Math.random()*6});
  }
  // reset party defending
  G.party.forEach(p=>{p.defending=false;});
  renderEnemies();renderParty();renderAllies();
  setMsg(B.enemies.length>1?`${B.enemies[0].name} 무리가 나타났다!`:`${B.enemies[0].name}(이)가 나타났다!`);
  setTimeout(()=>beginRound(),900);
}

function renderEnemies(){
  const row=$("#enemyRow");row.innerHTML="";
  B.enemies.forEach((e,i)=>{
    const el=document.createElement("div");el.className="enemy";el.dataset.id=e.id;
    const sk=e.type==="brass"?"slime_brass":"slime_cog";
    if(ready(sk)){
      const img=document.createElement("img");img.src=IMG[sk].src;
      img.style.width="230px";img.style.height="230px";img.draggable=false;
      el.appendChild(img);
    }else{
      const cv=document.createElement("canvas");cv.width=140;cv.height=130;
      const ctx=cv.getContext("2d");
      drawSlime(ctx,70,86,e.type,e.wob,e.t);
      el.appendChild(cv);
    }
    const hp=document.createElement("div");hp.className="enm-hp";hp.innerHTML='<i></i>';
    const nm=document.createElement("div");nm.className="enm-name";nm.textContent=e.name;
    el.appendChild(hp);el.appendChild(nm);
    el._hpfill=hp.querySelector("i");
    updateEnemyHP(e,el);
    if(!e.alive)el.classList.add("dead");
    el.addEventListener("click",()=>onEnemyClick(e,el));
    row.appendChild(el);e._el=el;
  });
}
function updateEnemyHP(e,el){el._hpfill.style.width=Math.max(0,e.hp/e.maxhp*100)+"%";}

function renderParty(){
  const row=$("#partyRow");row.innerHTML="";
  G.party.forEach((p,i)=>{
    const el=document.createElement("div");el.className="pcard"+(p.alive?"":" dead");el.dataset.i=i;
    const bk="battler_"+p.cls;
    const face=ready(bk)
      ? `<img class="pi-img" src="${IMG[bk].src}" alt="${p.clsName}" draggable="false">`
      : `<span class="pi">${p.ico}</span>`;
    el.innerHTML=`<div class="ph">${face}<span class="pn">${p.name}</span></div>
      <div class="bar hp"><i style="width:${p.hp/p.maxhp*100}%"></i><span class="lbl">${p.hp}/${p.maxhp}</span></div>
      <div class="bar mp"><i style="width:${p.maxmp?p.mp/p.maxmp*100:0}%"></i><span class="lbl">${p.mp}/${p.maxmp}</span></div>`;
    row.appendChild(el);p._el=el;
  });
}
function refreshPartyCard(p){
  const el=p._el;if(!el)return;
  el.querySelector(".hp i").style.width=Math.max(0,p.hp/p.maxhp*100)+"%";
  el.querySelector(".hp .lbl").textContent=`${Math.max(0,p.hp)}/${p.maxhp}`;
  el.querySelector(".mp i").style.width=(p.maxmp?p.mp/p.maxmp*100:0)+"%";
  el.querySelector(".mp .lbl").textContent=`${p.mp}/${p.maxmp}`;
  el.classList.toggle("dead",!p.alive);
  syncAllyUnit(p);
}

function renderAllies(){
  const st=$("#allyStage");if(!st)return;
  st.innerHTML="";
  G.party.forEach((p,i)=>{
    const el=document.createElement("div");
    el.className="ally-unit"+(p.alive?"":" dead")+(B.curMember===p?" active":"");
    el.dataset.i=i;el.dataset.cls=p.cls;
    const cv=makeRearSpriteCanvas(p.cls);
    if(cv){ el.appendChild(cv); }
    else{
      const fallback=document.createElement("div");fallback.style.fontSize="54px";fallback.textContent=p.ico;el.appendChild(fallback);
    }
    const nm=document.createElement("div");nm.className="ally-name";nm.textContent=p.name;el.appendChild(nm);
    st.appendChild(el);
  });
}
function syncAllyUnit(p){
  const idx=G.party.indexOf(p),el=document.querySelector(`.ally-unit[data-i="${idx}"]`);
  if(!el)return;el.classList.toggle("dead",!p.alive);el.classList.toggle("active",B.curMember===p);
}
function makeRearSpriteCanvas(cls){
  const key=CLS_WALK[cls]||"walk_warrior";
  if(!ready(key))return null;
  const cell=192,row=1,col=2; // up-facing center frame = rear view
  const cv=document.createElement('canvas');
  cv.width=cell;cv.height=cell;cv.className='ally-back-cv';
  const cx=cv.getContext('2d');
  cx.imageSmoothingEnabled=true;
  cx.drawImage(IMG[key],col*cell,row*cell,cell,cell,0,0,cell,cell);
  return cv;
}

function setMsg(t){$("#msglog").textContent=t;}
function wait(ms){return new Promise(r=>setTimeout(r,ms));}

//------------- round / turn order -------------
function beginRound(){
  if(B.over)return;
  // build turn queue by speed (members + enemies alive)
  const units=[];
  G.party.forEach(p=>{if(p.alive)units.push({side:"ally",u:p,spd:p.spd+Math.random()*2});});
  B.enemies.forEach(e=>{if(e.alive)units.push({side:"enemy",u:e,spd:e.spd+Math.random()*2});});
  units.sort((a,b)=>b.spd-a.spd);
  B.turnQueue=units;B.idx=0;
  G.party.forEach(p=>p.defending=false);
  nextTurn();
}
async function nextTurn(){
  if(B.over)return;
  if(checkBattleEnd())return;
  if(B.idx>=B.turnQueue.length){beginRound();return;}
  const slot=B.turnQueue[B.idx];
  // skip dead
  if(!slot.u.alive){B.idx++;return nextTurn();}
  if(slot.side==="ally"){
    promptAlly(slot.u);
  }else{
    await enemyTurn(slot.u);
    B.idx++;await wait(250);nextTurn();
  }
}

//------------- ally command -------------
let awaitingTarget=null; // {kind:'attack'|skill, member, skill}
function promptAlly(member){
  B.curMember=member;
  $$(".pcard").forEach(c=>c.classList.remove("active"));
  member._el.classList.add("active");
  renderAllies();
  setMsg(`${member.name}의 차례 — 명령을 내려라.`);
  // toggle skill availability
  closeSkillMenu();
  enableCmds(true);
}
function enableCmds(on){
  $$("#cmds .cmd").forEach(c=>c.classList.toggle("dis",!on));
}
$$("#cmds .cmd").forEach(c=>c.addEventListener("click",()=>onCmd(c.dataset.c)));

function onCmd(cmd){
  const m=B.curMember;if(!m||B.busy)return;
  if(cmd==="attack"){awaitingTarget={kind:"attack",member:m};askTarget("공격할 적을 선택하라.");}
  else if(cmd==="skill"){openSkillMenu(m);}
  else if(cmd==="defend"){m.defending=true;closeSkillMenu();enableCmds(false);
    actionDone(`${m.name}(은)는 방어 태세를 취했다.`);}
  else if(cmd==="flee"){doFlee();}
}
function openSkillMenu(m){
  const sm=$("#skillMenu");sm.innerHTML="";
  if(!m.skills||!m.skills.length){setMsg("사용할 기술이 없다.");return;}
  m.skills.forEach(sk=>{
    const can=m.mp>=sk.cost;
    const el=document.createElement("div");el.className="sk"+(can?"":" dis");
    el.innerHTML=`<span>${sk.name} <small style="opacity:.6">${sk.desc}</small></span><span class="cost">${sk.cost}MP</span>`;
    el.addEventListener("click",()=>{if(!can)return;chooseSkill(m,sk);});
    sm.appendChild(el);
  });
  const back=document.createElement("div");back.className="sk";back.style.textAlign="center";
  back.innerHTML='<span style="margin:auto;opacity:.7">↩ 취소</span>';
  back.addEventListener("click",closeSkillMenu);sm.appendChild(back);
  sm.classList.add("show");
}
function closeSkillMenu(){$("#skillMenu").classList.remove("show");}
function chooseSkill(m,sk){
  closeSkillMenu();
  if(sk.type==="heal"){
    // heal lowest-hp ally
    const targets=G.party.filter(p=>p.alive);
    const t=targets.sort((a,b)=>(a.hp/a.maxhp)-(b.hp/b.maxhp))[0];
    castHeal(m,sk,t);
  }else{
    awaitingTarget={kind:"skill",member:m,skill:sk};
    askTarget(`${sk.name} — 대상을 선택하라.`);
  }
}
function askTarget(msg){
  setMsg(msg);enableCmds(false);
  // highlight selectable enemies
  B.enemies.forEach(e=>{if(e.alive)e._el.classList.add("target");});
}
function clearTargets(){B.enemies.forEach(e=>e._el&&e._el.classList.remove("target"));}
function onEnemyClick(e,el){
  if(!awaitingTarget||!e.alive||B.busy)return;
  const a=awaitingTarget;awaitingTarget=null;clearTargets();
  if(a.kind==="attack")doAttack(a.member,e);
  else doSkill(a.member,a.skill,e);
}

//------------- damage helpers -------------
function calcPhys(att,def,pow=1){
  let base=att.atk*pow - def.def*0.5;
  base*= (0.85+Math.random()*0.3);
  if(def.defending)base*=0.5;
  return Math.max(1,Math.round(base));
}
function calcMag(att,def,pow){
  let base=att.mag*pow - def.def*0.25;
  base*=(0.9+Math.random()*0.2);
  if(def.defending)base*=0.6;
  return Math.max(1,Math.round(base));
}
function floatDmg(el,val,color,crit){
  const r=el.getBoundingClientRect();const g=$("#game").getBoundingClientRect();
  const d=document.createElement("div");d.className="dmg";d.textContent=val;
  d.style.color=color;d.style.left=(r.left-g.left+r.width/2-14)+"px";
  d.style.top=(r.top-g.top+10)+"px";
  if(crit)d.style.fontSize="40px";
  $("#game").appendChild(d);setTimeout(()=>d.remove(),1000);
}

async function doAttack(m,e){
  B.busy=true;enableCmds(false);
  setMsg(`${m.name}의 공격!`);
  await wait(420);
  const dmg=calcPhys(m,e);
  e.hp-=dmg;e._el.classList.add("hurt");floatDmg(e._el,dmg,"#ff7a5c");
  await wait(120);e._el.classList.remove("hurt");
  updateEnemyHP(e,e._el);
  if(e.hp<=0)killEnemy(e);
  await wait(450);actionDone();
}
async function doSkill(m,sk,e){
  B.busy=true;enableCmds(false);m.mp-=sk.cost;refreshPartyCard(m);
  setMsg(`${m.name}의 「${sk.name}」!`);
  await wait(450);
  if(sk.type==="phys"){
    const dmg=Math.round(calcPhys(m,e,sk.pow));
    e.hp-=dmg;e._el.classList.add("hurt");floatDmg(e._el,dmg,"#ffcf3a",true);
    await wait(120);e._el.classList.remove("hurt");updateEnemyHP(e,e._el);
    if(e.hp<=0)killEnemy(e);
  }else if(sk.type==="phys2"){
    for(let i=0;i<2;i++){
      if(!e.alive)break;
      const dmg=Math.round(calcPhys(m,e,sk.pow));
      e.hp-=dmg;e._el.classList.add("hurt");floatDmg(e._el,dmg,"#7af0a8");
      await wait(260);e._el.classList.remove("hurt");updateEnemyHP(e,e._el);
      if(e.hp<=0){killEnemy(e);break;}
    }
  }else if(sk.type==="mag"){
    const dmg=calcMag(m,e,sk.pow);
    e.hp-=dmg;e._el.classList.add("hurt");floatDmg(e._el,dmg,"#9ab8ff",true);
    await wait(120);e._el.classList.remove("hurt");updateEnemyHP(e,e._el);
    if(e.hp<=0)killEnemy(e);
  }
  await wait(450);actionDone();
}
async function castHeal(m,sk,t){
  B.busy=true;enableCmds(false);closeSkillMenu();m.mp-=sk.cost;refreshPartyCard(m);
  setMsg(`${m.name}의 「${sk.name}」!`);
  await wait(450);
  const amt=sk.pow+Math.round(m.mag*0.4);
  t.hp=Math.min(t.maxhp,t.hp+amt);refreshPartyCard(t);
  floatDmg(t._el,"+"+amt,"#7af0a8");
  setMsg(`${t.name}의 HP가 ${amt} 회복되었다.`);
  await wait(650);actionDone();
}
function killEnemy(e){e.alive=false;e._el.classList.add("dead");}

function actionDone(msg){
  if(msg)setMsg(msg);
  $$(".pcard").forEach(c=>c.classList.remove("active"));
  renderAllies();
  B.busy=false;
  if(checkBattleEnd())return;
  setTimeout(()=>{B.idx++;nextTurn();},msg?700:300);
}

//------------- enemy turn -------------
async function enemyTurn(e){
  if(!e.alive)return;
  const targets=G.party.filter(p=>p.alive);
  if(!targets.length)return;
  // prefer lower hp sometimes
  const t=Math.random()<.4
    ? targets.sort((a,b)=>a.hp-b.hp)[0]
    : targets[Math.floor(Math.random()*targets.length)];
  setMsg(`${e.name}의 공격!`);
  await wait(500);
  const dmg=calcPhys(e,t);
  t.hp-=dmg;t._el.classList.add("phurt");
  const au=document.querySelector(`.ally-unit[data-i="${G.party.indexOf(t)}"]`);if(au)au.classList.add("phurt");
  floatDmg(t._el,dmg,"#ff5c5c");
  await wait(140);t._el.classList.remove("phurt");if(au)au.classList.remove("phurt");
  if(t.hp<=0){t.hp=0;t.alive=false;setMsg(`${t.name}(이)가 쓰러졌다…`);}
  refreshPartyCard(t);
  await wait(420);
}

//------------- flee -------------
async function doFlee(){
  B.busy=true;closeSkillMenu();enableCmds(false);
  setMsg("도망치려 한다…");
  await wait(700);
  if(Math.random()<0.6){
    setMsg("무사히 달아났다!");
    await wait(700);await endBattle("flee");
  }else{
    setMsg("…하지만 막혀버렸다!");
    await wait(800);actionDone();
  }
}

//------------- end conditions -------------
function checkBattleEnd(){
  if(B.over)return true;
  if(B.enemies.every(e=>!e.alive)){B.over=true;endBattle("win");return true;}
  if(G.party.every(p=>!p.alive)){B.over=true;endBattle("lose");return true;}
  return false;
}
async function endBattle(kind){
  B.over=true;enableCmds(false);clearTargets();
  const res=$("#result");res.className="";
  if(kind==="win"){
    const exp=B.enemies.reduce((a,e)=>a+e.exp,0);
    const gold=B.enemies.reduce((a,e)=>a+e.gold,0);
    G.player.exp+=exp;G.player.gold+=gold;
    let lvlMsg=gainExp(exp);
    res.classList.add("win");
    $("#resTitle").textContent="승리!";
    $("#resBody").innerHTML=`경험치 <b style="color:#ffcf6e">${exp}</b> · 골드 <b style="color:#ffcf6e">${gold}</b> 획득!<br>${lvlMsg||""}`;
    res.style.display="flex";
    $("#resBtn").textContent="초원으로";
    $("#resBtn").onclick=()=>{res.style.display="none";returnToOverworld(true);};
  }else if(kind==="lose"){
    res.classList.add("lose");
    $("#resTitle").textContent="전멸…";
    $("#resBody").innerHTML="그대의 모험은 여기서 끝나는가…<br>하지만 증기는 멈추지 않는다.";
    res.style.display="flex";
    $("#resBtn").textContent="다시 일어선다";
    $("#resBtn").onclick=()=>{res.style.display="none";reviveAndReturn();};
  }else{ // flee
    returnToOverworld(false);
  }
}
function gainExp(){
  // simple level up: every (lv*30) exp
  let msg="";
  while(G.player.exp>= G.player.lv*30){
    G.player.exp-=G.player.lv*30;G.player.lv++;
    // boost whole party
    G.party.forEach(p=>{
      p.maxhp+=Math.round(p.maxhp*0.12);p.hp=p.maxhp;
      p.maxmp+=Math.round(p.maxmp*0.1);p.mp=p.maxmp;
      p.atk+=2;p.def+=1;p.mag+=p.mag?2:0;
    });
    msg=`레벨 업! 파티가 Lv.${G.player.lv}(이) 되었다!`;
  }
  $("#hudLv").textContent="Lv."+G.player.lv;
  return msg;
}
function reviveAndReturn(){
  // revive party at half hp
  G.party.forEach(p=>{p.alive=true;p.hp=Math.max(1,Math.round(p.maxhp*0.5));p.defending=false;});
  G.player.gold=Math.floor(G.player.gold*0.5);
  returnToOverworld(false);
}

async function returnToOverworld(consumeSlime){
  await fade(true);
  if(consumeSlime&&pendingEnemy)pendingEnemy.alive=false;
  // light heal between battles (small regen)
  G.party.forEach(p=>{if(p.alive){p.hp=Math.min(p.maxhp,p.hp+Math.round(p.maxhp*0.15));p.mp=Math.min(p.maxmp,p.mp+2);}});
  show("overworld");
  ow.active=true;ow.encounterCD=60;
  cancelAnimationFrame(ow.raf);loopOW();
  // check victory of map
  if(ow.slimes.every(s=>!s.alive)){
    toast("초원의 슬라임을 모두 물리쳤다! 데모 클리어 — 🎉");
  }else{
    toast("이동: 방향키/WASD · 슬라임에게 다가가 전투!");
  }
  saveGame();
  await fade(false);
}
